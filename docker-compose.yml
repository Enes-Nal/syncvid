services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_SERVER_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - server
